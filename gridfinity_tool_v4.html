<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridfinity Layout Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #18181b; }
    .bin-invalid { animation: shake 0.3s; }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-2px, 0); }
      75% { transform: translate(2px, 0); }
    }
    .ghost-bin {
      pointer-events: none;
      opacity: 0.3;
      border: 1px dashed #666 !important;
    }
    .preview-bin {
      pointer-events: none;
      border: 2px dashed #fbbf24 !important;
      opacity: 0.85;
    }
    .preview-invalid {
      background: #dc2626 !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useCallback, useEffect, useRef, useMemo, Fragment } = React;

    const DEFAULT_CATEGORIES = [
      { id: 'tools', name: 'Tools', color: '#ef4444' },
      { id: 'printing', name: '3D Printing', color: '#3b82f6' },
      { id: 'electronics', name: 'Electronics', color: '#10b981' },
      { id: 'household', name: 'Household', color: '#8b5cf6' },
      { id: 'open', name: 'Open', color: '#6b7280' },
    ];

    const genId = () => `id-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
    const STAGING_ID = '__staging__';
    const MAX_HISTORY = 50;

    const createDefaultState = () => ({
      version: '1.0',
      name: 'My Drawer Layout',
      drawer: { width: 20, depth: 10, height: 12 },
      maxPrintSize: 4,
      filamentBaseline: 1.88,
      categories: [...DEFAULT_CATEGORIES],
      layers: [
        { id: genId(), name: 'Layer 1', height: 3 },
        { id: genId(), name: 'Layer 2', height: 9 },
      ],
      bins: [],
    });

    const calcFilament = (w, d, h, baseline) => {
      const baseArea = w * d * 42 * 42;
      const wallPerimeter = 2 * (w + d) * 42;
      const wallHeight = h * 7;
      const wallArea = wallPerimeter * wallHeight;
      return (baseArea * 0.002 + wallArea * 0.004) * baseline * 0.5;
    };

    const splitBin = (w, d, maxSize) => {
      const pieces = [];
      if (w <= maxSize && d <= maxSize) {
        pieces.push({ w, d, count: 1 });
      } else if (w > maxSize && d <= maxSize) {
        pieces.push({ w: Math.ceil(w / 2), d, count: 1 });
        pieces.push({ w: Math.floor(w / 2), d, count: 1 });
      } else if (w <= maxSize && d > maxSize) {
        pieces.push({ w, d: Math.ceil(d / 2), count: 1 });
        pieces.push({ w, d: Math.floor(d / 2), count: 1 });
      } else {
        pieces.push({ w: Math.ceil(w / 2), d: Math.ceil(d / 2), count: 1 });
        pieces.push({ w: Math.floor(w / 2), d: Math.ceil(d / 2), count: 1 });
        pieces.push({ w: Math.ceil(w / 2), d: Math.floor(d / 2), count: 1 });
        pieces.push({ w: Math.floor(w / 2), d: Math.floor(d / 2), count: 1 });
      }
      return pieces.filter(p => p.w > 0 && p.d > 0);
    };

    const validateImport = (data) => {
      const errors = [];
      if (!data.version) errors.push('Missing version');
      if (!data.drawer || typeof data.drawer.width !== 'number') errors.push('Invalid drawer');
      if (!Array.isArray(data.layers) || data.layers.length === 0) errors.push('Invalid layers');
      if (!Array.isArray(data.bins)) errors.push('Invalid bins');
      if (!Array.isArray(data.categories)) errors.push('Invalid categories');
      if (errors.length === 0) {
        const layerIds = new Set(data.layers.map(l => l.id));
        layerIds.add(STAGING_ID);
        data.bins.forEach((bin, i) => {
          if (!layerIds.has(bin.layerId)) errors.push(`Bin ${i} references invalid layer`);
          if (bin.layerId !== STAGING_ID && (bin.x < 0 || bin.y < 0 || bin.x + bin.width > data.drawer.width || bin.y + bin.depth > data.drawer.depth)) {
            errors.push(`Bin ${i} is out of bounds`);
          }
        });
        const totalHeight = data.layers.reduce((sum, l) => sum + l.height, 0);
        if (totalHeight > data.drawer.height) errors.push(`Layer heights exceed drawer`);
      }
      return errors;
    };

    function App() {
      const [state, setState] = useState(() => {
        try {
          const saved = localStorage.getItem('gridfinity-layout-v3');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (validateImport(parsed).length === 0) return parsed;
          }
        } catch (e) {}
        return createDefaultState();
      });

      const [history, setHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [isUndoRedo, setIsUndoRedo] = useState(false);

      const [activeLayerId, setActiveLayerId] = useState(state.layers[0]?.id);
      const [selectedBinId, setSelectedBinId] = useState(null);
      const [activeCategoryId, setActiveCategoryId] = useState('tools');
      const [zoom, setZoom] = useState(1);
      const [showHelp, setShowHelp] = useState(false);
      const [showOtherLayers, setShowOtherLayers] = useState(true);

      // Interaction state
      const [interaction, setInteraction] = useState(null);
      // Types: { type: 'draw', start: {x,y}, end: {x,y} }
      //        { type: 'drag', bin, preview: {x,y}, valid, source }
      //        { type: 'resize', bin, handle, preview: {x,y,w,d}, valid }

      const gridRef = useRef(null);
      
      const [showImport, setShowImport] = useState(false);
      const [importText, setImportText] = useState('');
      const [editingLayerId, setEditingLayerId] = useState(null);
      const [editingCategoryId, setEditingCategoryId] = useState(null);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [newCategory, setNewCategory] = useState({ name: '', color: '#888888' });

      const baseCellSize = 28;
      const cellSize = Math.round(baseCellSize * zoom);

      // State update with history
      const updateState = useCallback((newState) => {
        if (!isUndoRedo) {
          setHistory(h => {
            const newHistory = h.slice(0, historyIndex + 1);
            newHistory.push(state);
            if (newHistory.length > MAX_HISTORY) newHistory.shift();
            return newHistory;
          });
          setHistoryIndex(i => Math.min(i + 1, MAX_HISTORY - 1));
        }
        setState(newState);
        setIsUndoRedo(false);
      }, [state, historyIndex, isUndoRedo]);

      const undo = useCallback(() => {
        if (historyIndex >= 0) {
          setIsUndoRedo(true);
          setState(history[historyIndex]);
          setHistoryIndex(i => i - 1);
        }
      }, [history, historyIndex]);

      const redo = useCallback(() => {
        if (historyIndex < history.length - 1) {
          setIsUndoRedo(true);
          setState(history[historyIndex + 1]);
          setHistoryIndex(i => i + 1);
        }
      }, [history, historyIndex]);

      useEffect(() => {
        localStorage.setItem('gridfinity-layout-v3', JSON.stringify(state));
      }, [state]);

      useEffect(() => {
        if (!state.layers.find(l => l.id === activeLayerId) && state.layers.length > 0) {
          setActiveLayerId(state.layers[0].id);
        }
      }, [state.layers, activeLayerId]);

      // Derived state
      const activeLayer = state.layers.find(l => l.id === activeLayerId);
      const layerBins = state.bins.filter(b => b.layerId === activeLayerId);
      const otherLayerBins = state.bins.filter(b => b.layerId !== activeLayerId && b.layerId !== STAGING_ID);
      const stagingBins = state.bins.filter(b => b.layerId === STAGING_ID);
      const selectedBin = state.bins.find(b => b.id === selectedBinId);
      const totalLayerHeight = state.layers.reduce((sum, l) => sum + l.height, 0);

      // Grid coordinate helpers
      const getGridCoords = useCallback((clientX, clientY) => {
        if (!gridRef.current) return null;
        const rect = gridRef.current.getBoundingClientRect();
        const x = Math.floor((clientX - rect.left) / (cellSize + 1));
        const y = state.drawer.depth - 1 - Math.floor((clientY - rect.top) / (cellSize + 1));
        return { x, y };
      }, [cellSize, state.drawer.depth]);

      const clampCoords = useCallback((x, y) => ({
        x: Math.max(0, Math.min(x, state.drawer.width - 1)),
        y: Math.max(0, Math.min(y, state.drawer.depth - 1))
      }), [state.drawer.width, state.drawer.depth]);

      // Validation helpers
      const isCellOccupied = useCallback((x, y, excludeBinId = null) => {
        return layerBins.some(bin => {
          if (bin.id === excludeBinId) return false;
          return x >= bin.x && x < bin.x + bin.width && y >= bin.y && y < bin.y + bin.depth;
        });
      }, [layerBins]);

      const canPlaceBin = useCallback((x, y, w, d, excludeBinId = null) => {
        if (x < 0 || y < 0 || x + w > state.drawer.width || y + d > state.drawer.depth) return false;
        for (let cx = x; cx < x + w; cx++) {
          for (let cy = y; cy < y + d; cy++) {
            if (isCellOccupied(cx, cy, excludeBinId)) return false;
          }
        }
        return true;
      }, [isCellOccupied, state.drawer.width, state.drawer.depth]);

      const getBinAtCell = useCallback((x, y) => {
        return layerBins.find(bin => x >= bin.x && x < bin.x + bin.width && y >= bin.y && y < bin.y + bin.depth);
      }, [layerBins]);

      const binNeedsSplit = (bin) => bin.width > state.maxPrintSize || bin.depth > state.maxPrintSize;

      // Document-level mouse tracking
      useEffect(() => {
        if (!interaction) return;

        const handleMouseMove = (e) => {
          const coords = getGridCoords(e.clientX, e.clientY);
          if (!coords) return;
          const clamped = clampCoords(coords.x, coords.y);

          if (interaction.type === 'draw') {
            setInteraction(prev => ({ ...prev, end: clamped }));
          } else if (interaction.type === 'drag') {
            const bin = interaction.bin;
            const newX = Math.max(0, Math.min(clamped.x, state.drawer.width - bin.width));
            const newY = Math.max(0, Math.min(clamped.y, state.drawer.depth - bin.depth));
            const excludeId = interaction.source === 'grid' ? bin.id : null;
            const valid = canPlaceBin(newX, newY, bin.width, bin.depth, excludeId);
            setInteraction(prev => ({ ...prev, preview: { x: newX, y: newY }, valid }));
          } else if (interaction.type === 'resize') {
            const bin = interaction.bin;
            const handle = interaction.handle;
            let newX = bin.x, newY = bin.y, newW = bin.width, newD = bin.depth;

            if (handle.includes('e')) newW = Math.max(1, clamped.x - bin.x + 1);
            if (handle.includes('w')) {
              newW = Math.max(1, bin.x + bin.width - clamped.x);
              newX = Math.min(clamped.x, bin.x + bin.width - 1);
            }
            if (handle.includes('s')) {
              newD = Math.max(1, bin.y + bin.depth - clamped.y);
              newY = Math.min(clamped.y, bin.y + bin.depth - 1);
            }
            if (handle.includes('n')) newD = Math.max(1, clamped.y - bin.y + 1);

            // Clamp to bounds
            if (newX < 0) { newW += newX; newX = 0; }
            if (newY < 0) { newD += newY; newY = 0; }
            if (newX + newW > state.drawer.width) newW = state.drawer.width - newX;
            if (newY + newD > state.drawer.depth) newD = state.drawer.depth - newY;
            newW = Math.max(1, newW);
            newD = Math.max(1, newD);

            const valid = canPlaceBin(newX, newY, newW, newD, bin.id);
            setInteraction(prev => ({ ...prev, preview: { x: newX, y: newY, w: newW, d: newD }, valid }));
          }
        };

        const handleMouseUp = () => {
          if (interaction.type === 'draw' && activeLayer) {
            const x1 = Math.min(interaction.start.x, interaction.end.x);
            const y1 = Math.min(interaction.start.y, interaction.end.y);
            const x2 = Math.max(interaction.start.x, interaction.end.x);
            const y2 = Math.max(interaction.start.y, interaction.end.y);
            const w = x2 - x1 + 1, d = y2 - y1 + 1;
            if (canPlaceBin(x1, y1, w, d)) {
              const newBin = { id: genId(), layerId: activeLayerId, x: x1, y: y1, width: w, depth: d, height: activeLayer.height, category: activeCategoryId, label: '' };
              updateState({ ...state, bins: [...state.bins, newBin] });
              setSelectedBinId(newBin.id);
            }
          } else if (interaction.type === 'drag' && interaction.preview && interaction.valid) {
            const bin = interaction.bin;
            const p = interaction.preview;
            // Only update if something actually changed
            const moved = bin.x !== p.x || bin.y !== p.y || bin.layerId !== activeLayerId;
            if (moved) {
              updateState({
                ...state,
                bins: state.bins.map(b => b.id === bin.id ? {
                  ...b, x: p.x, y: p.y, layerId: activeLayerId, height: activeLayer?.height || b.height
                } : b)
              });
            }
          } else if (interaction.type === 'resize' && interaction.preview && interaction.valid) {
            const bin = interaction.bin;
            const p = interaction.preview;
            // Only update if something actually changed
            const resized = bin.x !== p.x || bin.y !== p.y || bin.width !== p.w || bin.depth !== p.d;
            if (resized) {
              updateState({
                ...state,
                bins: state.bins.map(b => b.id === bin.id ? { ...b, x: p.x, y: p.y, width: p.w, depth: p.d } : b)
              });
            }
          }
          setInteraction(null);
        };

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
        };
      }, [interaction, state, activeLayer, activeLayerId, activeCategoryId, canPlaceBin, getGridCoords, clampCoords, updateState]);

      // Keyboard shortcuts
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          
          if (e.key === 'Delete' || e.key === 'Backspace') {
            if (selectedBinId) { e.preventDefault(); deleteBin(); }
          } else if (e.key === 'Escape') {
            setInteraction(null);
            setSelectedBinId(null);
          } else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            e.shiftKey ? redo() : undo();
          } else if (e.key === 'y' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            redo();
          } else if (e.key === '=' || e.key === '+') {
            setZoom(z => Math.min(2, z + 0.1));
          } else if (e.key === '-') {
            setZoom(z => Math.max(0.5, z - 0.1));
          } else if (e.key === '?') {
            setShowHelp(h => !h);
          } else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && selectedBinId) {
            e.preventDefault();
            const bin = state.bins.find(b => b.id === selectedBinId);
            if (bin && bin.layerId !== STAGING_ID) {
              let dx = 0, dy = 0;
              if (e.key === 'ArrowUp') dy = 1;
              if (e.key === 'ArrowDown') dy = -1;
              if (e.key === 'ArrowLeft') dx = -1;
              if (e.key === 'ArrowRight') dx = 1;
              const newX = bin.x + dx, newY = bin.y + dy;
              if (canPlaceBin(newX, newY, bin.width, bin.depth, bin.id)) {
                updateState({ ...state, bins: state.bins.map(b => b.id === selectedBinId ? { ...b, x: newX, y: newY } : b) });
              }
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedBinId, undo, redo, state, canPlaceBin, updateState]);

      // Interaction starters
      const startDraw = (x, y) => {
        const existing = getBinAtCell(x, y);
        if (existing) {
          setSelectedBinId(existing.id);
        } else {
          setSelectedBinId(null);
          setInteraction({ type: 'draw', start: { x, y }, end: { x, y } });
        }
      };

      const startDrag = (bin, source = 'grid') => {
        setSelectedBinId(bin.id);
        setInteraction({
          type: 'drag',
          bin,
          preview: source === 'grid' ? { x: bin.x, y: bin.y } : null,
          valid: source === 'grid',
          source
        });
      };

      const startResize = (bin, handle) => {
        setSelectedBinId(bin.id);
        setInteraction({
          type: 'resize',
          bin,
          handle,
          preview: { x: bin.x, y: bin.y, w: bin.width, d: bin.depth },
          valid: true
        });
      };

      // Bin operations
      const deleteBin = () => {
        if (selectedBinId) {
          updateState({ ...state, bins: state.bins.filter(b => b.id !== selectedBinId) });
          setSelectedBinId(null);
        }
      };

      const updateBin = (prop, value) => {
        if (selectedBinId) {
          updateState({ ...state, bins: state.bins.map(b => b.id === selectedBinId ? { ...b, [prop]: value } : b) });
        }
      };

      const resizeBinManual = (prop, value) => {
        if (!selectedBinId) return;
        const bin = state.bins.find(b => b.id === selectedBinId);
        if (!bin) return;
        const newW = prop === 'width' ? Math.max(1, parseInt(value) || 1) : bin.width;
        const newD = prop === 'depth' ? Math.max(1, parseInt(value) || 1) : bin.depth;
        if (canPlaceBin(bin.x, bin.y, newW, newD, bin.id)) {
          updateState({ ...state, bins: state.bins.map(b => b.id === selectedBinId ? { ...b, width: newW, depth: newD } : b) });
        }
      };

      // Drawer operations
      const updateDrawer = (prop, value) => {
        const num = Math.max(1, parseInt(value) || 1);
        const newDrawer = { ...state.drawer, [prop]: num };
        const newBins = state.bins.map(bin => {
          if (bin.layerId === STAGING_ID) return bin;
          let b = { ...bin };
          if (b.x + b.width > newDrawer.width) b.x = Math.max(0, newDrawer.width - b.width);
          if (b.y + b.depth > newDrawer.depth) b.y = Math.max(0, newDrawer.depth - b.depth);
          if (b.x + b.width > newDrawer.width) b.width = newDrawer.width - b.x;
          if (b.y + b.depth > newDrawer.depth) b.depth = newDrawer.depth - b.y;
          if (b.width < 1 || b.depth < 1) return { ...bin, layerId: STAGING_ID };
          return b;
        });
        updateState({ ...state, drawer: newDrawer, bins: newBins });
      };

      // Layer operations
      const addLayer = () => {
        const remaining = state.drawer.height - totalLayerHeight;
        if (remaining >= 1) {
          const newLayer = { id: genId(), name: `Layer ${state.layers.length + 1}`, height: Math.min(remaining, 3) };
          updateState({ ...state, layers: [...state.layers, newLayer] });
        }
      };

      const deleteLayer = (layerId) => {
        const count = state.bins.filter(b => b.layerId === layerId).length;
        if (state.layers.length > 1 && confirm(`Delete layer${count ? ` and ${count} bin(s)` : ''}?`)) {
          updateState({ ...state, layers: state.layers.filter(l => l.id !== layerId), bins: state.bins.filter(b => b.layerId !== layerId) });
        }
      };

      const updateLayerHeight = (layerId, height) => {
        const h = Math.max(1, parseInt(height) || 1);
        const othersHeight = state.layers.filter(l => l.id !== layerId).reduce((sum, l) => sum + l.height, 0);
        const clamped = Math.min(h, state.drawer.height - othersHeight);
        updateState({
          ...state,
          layers: state.layers.map(l => l.id === layerId ? { ...l, height: clamped } : l),
          bins: state.bins.map(b => b.layerId === layerId ? { ...b, height: clamped } : b)
        });
      };

      const renameLayer = (layerId, name) => {
        updateState({ ...state, layers: state.layers.map(l => l.id === layerId ? { ...l, name } : l) });
      };

      const clearLayer = () => {
        const count = layerBins.length;
        if (count && confirm(`Clear ${count} bin(s)?`)) {
          updateState({ ...state, bins: state.bins.filter(b => b.layerId !== activeLayerId) });
          setSelectedBinId(null);
        }
      };

      // Staging
      const moveToStaging = () => {
        if (selectedBinId) {
          updateState({ ...state, bins: state.bins.map(b => b.id === selectedBinId ? { ...b, layerId: STAGING_ID } : b) });
        }
      };

      const moveFromStaging = (binId) => {
        const bin = state.bins.find(b => b.id === binId);
        if (bin && activeLayer) {
          for (let y = 0; y < state.drawer.depth; y++) {
            for (let x = 0; x < state.drawer.width; x++) {
              if (canPlaceBin(x, y, bin.width, bin.depth)) {
                updateState({ ...state, bins: state.bins.map(b => b.id === binId ? { ...b, layerId: activeLayerId, x, y, height: activeLayer.height } : b) });
                return;
              }
            }
          }
          alert('No space available');
        }
      };

      const clearStaging = () => {
        if (stagingBins.length && confirm(`Delete ${stagingBins.length} staged bin(s)?`)) {
          updateState({ ...state, bins: state.bins.filter(b => b.layerId !== STAGING_ID) });
        }
      };

      // Categories
      const addCategory = () => {
        if (newCategory.name.trim()) {
          updateState({ ...state, categories: [...state.categories, { id: genId(), name: newCategory.name.trim(), color: newCategory.color }] });
          setNewCategory({ name: '', color: '#888888' });
          setShowCategoryModal(false);
        }
      };

      const updateCategory = (id, prop, value) => {
        updateState({ ...state, categories: state.categories.map(c => c.id === id ? { ...c, [prop]: value } : c) });
      };

      const deleteCategory = (id) => {
        if (state.bins.some(b => b.category === id)) return alert('Category in use');
        if (state.categories.length <= 1) return alert('Need at least one category');
        updateState({ ...state, categories: state.categories.filter(c => c.id !== id) });
        if (activeCategoryId === id) setActiveCategoryId(state.categories.find(c => c.id !== id)?.id);
      };

      // Fill
      const fillWithBins = (binW, binD) => {
        if (!activeLayer) return;
        const newBins = [];
        for (let y = 0; y < state.drawer.depth; y += binD) {
          for (let x = 0; x < state.drawer.width; x += binW) {
            const w = Math.min(binW, state.drawer.width - x);
            const d = Math.min(binD, state.drawer.depth - y);
            if (w > 0 && d > 0 && canPlaceBin(x, y, w, d)) {
              newBins.push({ id: genId(), layerId: activeLayerId, x, y, width: w, depth: d, height: activeLayer.height, category: activeCategoryId, label: '' });
            }
          }
        }
        if (newBins.length) updateState({ ...state, bins: [...state.bins, ...newBins] });
      };

      // Import/Export
      const exportJSON = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${state.name.replace(/\s+/g, '-').toLowerCase()}.json`;
        a.click();
      };

      const handleImport = () => {
        try {
          const parsed = JSON.parse(importText);
          const errors = validateImport(parsed);
          if (errors.length) return alert('Errors:\n' + errors.join('\n'));
