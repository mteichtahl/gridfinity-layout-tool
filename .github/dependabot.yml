version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
    # Mirrors pnpm minimumReleaseAge — see SECURITY.md.
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # Group React ecosystem updates
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      # Group testing tools
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'playwright'
          - '@playwright/*'
      # Group Three.js ecosystem
      threejs:
        patterns:
          - 'three'
          - '@types/three'
          - '@react-three/*'
      # Group linting/formatting
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - 'typescript-eslint'
          - 'prettier'
    ignore:
      # Ignore major version updates for critical deps (review manually)
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # brepjs upgrades are coupled to the brepkit kernel investigation —
      # always pin manually, never auto-bump
      - dependency-name: 'brepjs'
      # Each Playwright version pins one exact Chromium revision, so every
      # minor/patch bump forces a fresh ~120MB browser download on the next
      # `playwright install`. Bump manually so the browser cache is stable.
      - dependency-name: 'playwright'
        update-types:
          ['version-update:semver-minor', 'version-update:semver-patch']
      - dependency-name: '@playwright/*'
        update-types:
          ['version-update:semver-minor', 'version-update:semver-patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'ci'
      - 'dependencies'
    # Action tag-retag defense — see SECURITY.md.
    cooldown:
      default-days: 7
