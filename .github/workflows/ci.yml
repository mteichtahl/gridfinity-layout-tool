name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  # PRs + main: Build and bundle size check
  build:
    name: Build
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check bundle size
        run: pnpm run size:check

      # Upload source maps to PostHog for error tracking (main branch only)
      # Requires POSTHOG_API_KEY and POSTHOG_PROJECT_ID secrets
      # Get these from PostHog: Settings > Environment > Source Maps
      - name: Upload source maps to PostHog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Third-party action — pinned to commit SHA (Dependabot will keep it current).
        uses: PostHog/upload-source-maps@991172e085213c222c61d2ba6a0b9e57c81e5066 # v2.0.0
        with:
          directory: dist
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_API_KEY }}

  # PRs: Split into two test groups for fast, balanced feedback (6 runners).
  #   Vitest shards by hashing the file path, not by duration, so the heavy
  #   brepjs/OpenCascade WASM generator tests (their own `generators` project)
  #   would otherwise cluster onto one shard and dominate wall time. Running
  #   them on dedicated shards decouples that bottleneck from hash luck. After
  #   the scenario monolith was split (#2017) the generator floor is ~166s
  #   (split-robustness), so both groups get 3 shards to land ~150-170s each.
  # Main: Full test suite (all projects) with coverage thresholds, single runner.
  test:
    name: Unit Tests (${{ matrix.name }})
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ github.event_name == 'pull_request'
          && fromJSON('[{"name":"generators 1/3","group":"generators","shard":"1/3"},{"name":"generators 2/3","group":"generators","shard":"2/3"},{"name":"generators 3/3","group":"generators","shard":"3/3"},{"name":"core 1/3","group":"core","shard":"1/3"},{"name":"core 2/3","group":"core","shard":"2/3"},{"name":"core 3/3","group":"core","shard":"3/3"}]')
          || fromJSON('[{"name":"full","group":"full","shard":"1/1"}]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate artifacts
        # en.json is generated from en.ts at build/dev time and gitignored.
        # Tests import it via lazy-loading, so it must exist before vitest runs.
        run: pnpm run build:en-locale

      - name: Run tests
        env:
          GIT_REF: ${{ github.ref }}
          GROUP: ${{ matrix.group }}
          SHARD: ${{ matrix.shard }}
        run: |
          if [ "$GIT_REF" = "refs/heads/main" ]; then
            echo "Running full suite with coverage (main branch)"
            pnpm vitest run --coverage -u
          elif [ "$GROUP" = "generators" ]; then
            echo "Running generators project (shard $SHARD)"
            pnpm vitest run --project=generators --shard="$SHARD" -u
          else
            echo "Running core projects unit+dom (shard $SHARD)"
            pnpm vitest run --project=unit --project=dom --shard="$SHARD" -u
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure() && github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5

  # Single stable gate that passes only if every Unit Tests shard passed.
  # Branch protection requires this one context instead of the individual
  # shard names, so shard/group counts can change without updating the ruleset.
  # always() so it still runs (and fails) when a shard fails; skipped for
  # release-please PRs in lockstep with the test job above.
  test-gate:
    name: Unit Tests Complete
    needs: [test]
    if: ${{ always() && !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify all unit-test shards passed
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "Unit test shards did not all pass (result: $TEST_RESULT)"
            exit 1
          fi
          echo "All unit-test shards passed."

  # PRs + main: Lint, i18n, module boundaries, union exhaustiveness
  # All checks run to completion so every failure is visible in one pass
  quality:
    name: Quality
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm run lint

      - name: Check i18n keys
        id: i18n_keys
        continue-on-error: true
        run: pnpm run check:i18n

      - name: Check i18n values
        id: i18n_values
        continue-on-error: true
        run: pnpm run check:i18n:values

      - name: Check i18n interpolation
        id: i18n_interpolation
        continue-on-error: true
        run: pnpm run check:i18n:interpolation

      - name: Check i18n unused keys
        id: i18n_unused
        # Full-codebase scan: only run when i18n source files changed, same as pre-commit gate.
        # This avoids blocking unrelated PRs while in-progress i18n work is uncommitted on main.
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            base=""  # initial push — no prior commit; run unconditionally
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || git diff --name-only "$base" HEAD | grep -qE '^src/i18n/'; then
            pnpm run check:i18n:unused
          else
            echo "ℹ️  No i18n files changed — skipping unused key scan"
          fi

      - name: Check module boundaries
        id: boundaries
        continue-on-error: true
        run: pnpm run check:boundaries

      - name: Check union exhaustiveness
        id: exhaustiveness
        continue-on-error: true
        run: pnpm run check:exhaustiveness -- --all

      - name: Fail if any check failed or was skipped
        # 'skipped' means a prior non-continue-on-error step (e.g. pnpm install) failed,
        # causing all downstream steps to be skipped. Treat skipped == failure here
        # so the job doesn't pass vacuously when dependency installation breaks.
        if: always()
        run: |
          failed=0
          check_step() {
            local name="$1" outcome="$2"
            if [ "$outcome" = "failure" ] || [ "$outcome" = "skipped" ]; then
              echo "  ✗ $name ($outcome)"
              failed=1
            fi
          }
          check_step "lint"                "${{ steps.lint.outcome }}"
          check_step "i18n keys"           "${{ steps.i18n_keys.outcome }}"
          check_step "i18n values"         "${{ steps.i18n_values.outcome }}"
          check_step "i18n interpolation"  "${{ steps.i18n_interpolation.outcome }}"
          check_step "i18n unused keys"    "${{ steps.i18n_unused.outcome }}"
          check_step "module boundaries"   "${{ steps.boundaries.outcome }}"
          check_step "union exhaustiveness" "${{ steps.exhaustiveness.outcome }}"
          if [ "$failed" = "1" ]; then
            echo "One or more quality checks failed or were skipped."
            exit 1
          fi
          echo "All quality checks passed."
