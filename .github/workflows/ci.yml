name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  # PRs: Just verify the build works (lint/format/tests run via pre-commit hooks)
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size:check

      # Upload source maps to PostHog for error tracking (main branch only)
      # Requires POSTHOG_API_KEY and POSTHOG_PROJECT_ID secrets
      # Get these from PostHog: Settings > Environment > Source Maps
      - name: Upload source maps to PostHog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: PostHog/upload-source-maps@v2.0.0
        with:
          directory: dist
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_API_KEY }}

  # Main branch only: Full test suite with coverage (safety net)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5
