name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Third-party action — pinned to commit SHA (Dependabot will keep it current).
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      - name: Auto-approve Release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ fromJSON(steps.release.outputs.pr).number }} \
            --approve --repo ${{ github.repository }}

      - name: Auto-merge Release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Guard fromJSON: when no release PR is created the output is empty and
          # fromJSON('') errors at template-eval time even though `if:` skips the step.
          PR_NUMBER: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number }}
        # `gh pr merge --auto` enables auto-merge, but GitHub rejects the call
        # (`Pull request is in unstable status`) in the brief window before the PR's
        # required checks register. Retry until they settle so the release isn't
        # left un-merged by a startup race.
        run: |
          for attempt in $(seq 1 6); do
            if gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"; then
              echo "Auto-merge enabled on attempt $attempt."
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "Attempt $attempt failed to enable auto-merge; retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Failed to enable auto-merge on PR #$PR_NUMBER after 6 attempts."
          exit 1
