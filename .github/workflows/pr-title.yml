name: PR Title

on:
  # pull_request_target runs in the base branch context with access to secrets.
  # This is intentional for title validation (no code checkout needed), but NEVER
  # add actions/checkout here without understanding the security implications:
  # https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      # Third-party action — pinned to commit SHA (Dependabot will keep it current).
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            a11y
            i18n
            refactor
            chore
            test
            docs
            style
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must not start with an uppercase letter.
            Use lowercase: "{subject}" → e.g. "feat: add dark mode"
