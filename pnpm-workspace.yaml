packages:
  - 'packages/*'

# Supply-chain hardening — see SECURITY.md for rationale.
# Cooldown unit is minutes; 10080 = 7 days.
minimumReleaseAge: 10080

# Excluded: user-authored packages (no security benefit from cooldown) +
# high-trust org scopes that release lockstep (would block install for a
# week on every dep bump). The trailing entries are temporary — see TODO.
minimumReleaseAgeExclude:
  - brepjs
  - brepkit-wasm
  - occt-wasm
  - '@types/*'
  - '@typescript-eslint/*'
  - typescript-eslint
  # @typescript/native-preview (the tsgo native compiler, incl. its
  # per-platform binary packages) publishes dated dev builds daily, so a fixed
  # cooldown would perpetually block the newest one.
  - '@typescript/native-preview*'
  - '@posthog/*'
  - posthog-js
  - '@vercel/*'
  - '@protobufjs/*'
  - protobufjs
  # esbuild 0.28.1 (2026-06-11) is the first version patched against
  # GHSA-gv7w-rqvm-qjhr and GHSA-g7r4-m6w7-qqqr; allow it (and its native
  # binary packages) through before the 7-day window elapses.
  # TODO: remove after 2026-06-18 once 0.28.1 has aged past the window.
  - esbuild
  - '@esbuild/*'
  # dompurify >=3.4.11 patches GHSA-cmwh-pvxp-8882 (permanent ALLOWED_ATTR
  # pollution via setConfig, incomplete fix of the 3.4.7 hook-pollution patch);
  # the override (^3.4.11) resolves to the latest 3.x at or above the patch.
  # Excluded so the patched release can land before its 7-day cooldown elapses.
  # TODO: remove once the resolved dompurify version has aged past the window
  # (3.4.11 published 2026-06-17 -> 2026-06-24).
  - dompurify
  # undici 7.28.0 / 6.27.0 (2026-06-15) are the first versions patched against
  # the SOCKS5 TLS-bypass + cross-origin routing (GHSA-vmh5-mc38-953g,
  # GHSA-hm92-r4w5-c3mj, GHSA-vxpw-j846-p89q) and Set-Cookie injection cluster;
  # allow them through before the 7-day window elapses.
  # TODO: remove after 2026-06-22 once both have aged past the window.
  - undici

# Blocks Shai-Hulud-class worms that spread via npm lifecycle scripts.
# Packages that need to build are listed in allowBuilds.
ignoreScripts: true

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  unrs-resolver: true

peerDependencyRules:
  allowedVersions:
    vite-plugin-pwa>vite: '^8.0.0'

overrides:
  '@vercel/node>undici': '^7.28.0'
  'undici@>=6.0.0 <6.27.0': '^6.27.0'
  'undici@>=7.0.0 <7.28.0': '^7.28.0'
  path-to-regexp: '6.3.0'
  '@rollup/plugin-replace>magic-string': '0.30.21'
  '@surma/rollup-plugin-off-main-thread>magic-string': '0.30.21'
  'workbox-build>@rollup/plugin-node-resolve': '^16.0.0'
  '@apideck/better-ajv-errors>ajv': '^8.17.1'
  fast-uri: '^3.1.2'
  serialize-javascript: '^7.0.3'
  'eslint-plugin-react-hooks>eslint': '^10.0.3'
  'eslint-plugin-jsx-a11y>eslint': '^10.0.3'
  'eslint-plugin-jsx-a11y>minimatch': '^3.1.3'
  '@vercel/build-utils>minimatch': '^10.2.3'
  '@vercel/python-analysis>minimatch': '^10.2.3'
  '@vercel/static-config>ajv': '^8.18.0'
  'glob>minimatch': '^10.2.3'
  flatted: '^3.4.2'
  dompurify: '^3.4.11'
  '@babel/core@<7.29.6': '^7.29.6'
  'js-yaml@<4.2.0': '^4.2.0'
  protobufjs: '^7.6.3'
  'eslint-plugin-i18next>lodash': '^4.18.1'
  'vitest-axe>lodash-es': '^4.18.1'
  'picomatch@>=4.0.0 <4.0.4': '^4.0.4'
  '@vercel/python-analysis>smol-toml': '^1.6.1'
  esbuild: '0.28.1'
